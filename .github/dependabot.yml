version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      python-dev:
        patterns:
          - "pyright"
          - "pymarkdownlnt"
          - "pytest"
          - "pytest-cov"
          - "ruff"
          - "yamllint"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"
