name: Change Validation

"on":
  workflow_call:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: change-validation-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test-suite:
    uses: ./.github/workflows/test-suite.yml
