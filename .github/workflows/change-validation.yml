name: Change Validation

"on":
  workflow_call:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test-suite:
    uses: ./.github/workflows/test-suite.yml

  # Fork PRs do not have the credentials needed for GHCR push and keyless cosign.
  test-e2e:
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/test-e2e.yml
