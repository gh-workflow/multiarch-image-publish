name: publish

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    outputs:
      digest_amd64: ${{ steps.out-amd64.outputs.digest }}
      digest_arm64: ${{ steps.out-arm64.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          push: true  # Push the arch image so provenance is published.
          provenance: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/acme/my-image:${{ github.sha }}-${{ matrix.arch }}-seed
          # Temporary pushed tag for build/test; final tags are published later.

      - name: Test image
        run: |
          docker run --rm \
            ghcr.io/acme/my-image@${{ steps.build.outputs.digest }} \
            your-test-command

      - name: Export amd64 digest
        id: out-amd64
        if: matrix.arch == 'amd64'
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Export arm64 digest
        id: out-arm64
        if: matrix.arch == 'arm64'
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image
        uses: gh-workflow/multiarch-image-publish@8e1cd7ed6d945ab406211187e9582237d2700ac4  # 0.0.4
        with:
          image_ref: ghcr.io/acme/my-image
          tags: |
            ${{ github.ref_name }}
            latest
          platform_digests: |
            linux/amd64=${{ needs.build.outputs.digest_amd64 }}
            linux/arm64=${{ needs.build.outputs.digest_arm64 }}
