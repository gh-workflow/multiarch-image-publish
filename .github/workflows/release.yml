name: Release

"on":
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  change-validation:
    uses: ./.github/workflows/change-validation.yml

  verify-release-refs:
    name: Verify release references
    needs: [change-validation]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Verify README and example workflow use current tag
        run: |
          set -euo pipefail
          if rg -n "gh-workflow/multiarch-image-publish@(?!${GITHUB_REF_NAME}\\b)" \
            README.md .github/workflows/example.yml -P; then
            echo "Found action refs not pinned to ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  release:
    name: Publish release
    needs: [change-validation, verify-release-refs]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
