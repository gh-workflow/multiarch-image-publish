name: Test End-to-End

"on":
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  example:
    uses: ./.github/workflows/example.yml

  verify:
    name: Verify published result
    runs-on: ubuntu-latest
    needs: [example]
    steps:
      - name: Log in to Docker Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0

      - name: Verify final manifest signature
        shell: bash
        run: |
          set -euo pipefail
          certificate_identity_regexp="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/.*@(?:refs/.*/.*|[0-9a-f]{40})$"
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "${certificate_identity_regexp}" \
            "${{ needs.example.outputs.image_ref }}@${{ needs.example.outputs.manifest_digest }}"

      - name: Verify final tags resolve to manifest digest
        shell: bash
        run: |
          set -euo pipefail
          for tag in \
            "${{ needs.example.outputs.version_tag }}" \
            "${{ needs.example.outputs.latest_tag }}"
          do
            digest="$(
              docker buildx imagetools inspect \
                --format '{{json .Manifest}}' \
                "${{ needs.example.outputs.image_ref }}:${tag}" \
                | jq -r '.digest'
            )"
            test "$digest" = "${{ needs.example.outputs.manifest_digest }}"
          done

      - name: Verify final manifest includes both platforms
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect \
            --raw "${{ needs.example.outputs.image_ref }}@${{ needs.example.outputs.manifest_digest }}" \
            | jq -e '
              .manifests as $manifests
              | any($manifests[]?; .platform.os == "linux" and .platform.architecture == "amd64")
                and any($manifests[]?; .platform.os == "linux" and .platform.architecture == "arm64")
            '

      - name: Verify per-platform tags resolve to original digests
        shell: bash
        run: |
          set -euo pipefail
          amd64_digest="$(
            docker buildx imagetools inspect \
              --format '{{json .Manifest}}' \
              "${{ needs.example.outputs.image_ref }}:${{ needs.example.outputs.version_tag }}-amd64" \
              | jq -r '.digest'
          )"
          arm64_digest="$(
            docker buildx imagetools inspect \
              --format '{{json .Manifest}}' \
              "${{ needs.example.outputs.image_ref }}:${{ needs.example.outputs.version_tag }}-arm64" \
              | jq -r '.digest'
          )"
          test "$amd64_digest" = "${{ needs.example.outputs.digest_amd64 }}"
          test "$arm64_digest" = "${{ needs.example.outputs.digest_arm64 }}"
