name: Test Suite

"on":
  workflow_call:
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run linters
        run: |
          scripts/lint.sh

      - name: Check `example-main.yml` only differs by action ref
        run: |
          python - <<'PY'
          from pathlib import Path

          example_main = Path(".github/workflows/example-main.yml").read_text(encoding="utf-8")
          normalized = example_main.replace(
              "name: Example Publish Main",
              "name: Example Publish",
          ).replace(
              "gh-workflow/multiarch-image-publish@main",
              "gh-workflow/multiarch-image-publish@0.1.3",
          )
          Path("/tmp/example-main.normalized.yml").write_text(normalized, encoding="utf-8")
          PY
          diff -u .github/workflows/example.yml /tmp/example-main.normalized.yml

      - name: Check `example-dockerhub-main.yml` only differs by action ref
        run: |
          python - <<'PY'
          from pathlib import Path

          example_main = Path(".github/workflows/example-dockerhub-main.yml").read_text(
              encoding="utf-8"
          )
          normalized = example_main.replace(
              "name: Example Publish Docker Hub Main",
              "name: Example Publish Docker Hub",
          ).replace(
              "gh-workflow/multiarch-image-publish@main",
              "gh-workflow/multiarch-image-publish@0.1.3",
          )
          Path("/tmp/example-dockerhub-main.normalized.yml").write_text(
              normalized, encoding="utf-8"
          )
          PY
          diff -u .github/workflows/example-dockerhub.yml /tmp/example-dockerhub-main.normalized.yml

      - name: Run tests
        run: |
          pytest --cov=src --cov-report=term-missing
