name: Publish Multi-Arch Image

description: >
  Publish and sign a multi-arch container image from pre-built arch images.

inputs:
  image_ref:
    description: Full image reference (registry/repo).
    required: true
  tags:
    description: Newline-separated list of tags to publish.
    required: true
  platform_digests:
    description: Newline-separated list of platform=digest pairs.
    required: true
  certificate_oidc_issuer:
    description: Expected OIDC issuer for cosign verification.
    required: false
    default: https://token.actions.githubusercontent.com

outputs:
  manifest_digest:
    description: Published multi-arch manifest digest.
    value: ${{ steps.publish.outputs.manifest_digest }}

runs:
  using: composite
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0

    - name: Install regctl
      uses: regclient/actions/regctl-installer@1b705e32d40851370799ea5814e83d0a5f6a70dc  # v0.1.0

    - name: Run multi-arch publish
      id: publish
      shell: bash
      env:
        PYTHONPATH: ${{ github.action_path }}/src
        INPUT_IMAGE_REF: ${{ inputs.image_ref }}
        INPUT_TAGS: ${{ inputs.tags }}
        INPUT_PLATFORM_DIGESTS: ${{ inputs.platform_digests }}
        INPUT_CERTIFICATE_OIDC_ISSUER: ${{ inputs.certificate_oidc_issuer }}
      run: |
        set -euo pipefail
        python3 -m multiarch_publish
